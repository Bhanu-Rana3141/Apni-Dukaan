    <div class="contact">

        <div class="form">

            <h2>Send us a message</h2>

            <label for="name">
                Name <span style="color: red;">*</span>
                <br>
                <input type="text" id="name" placeholder="Enter your name" required>
            </label>
            
            <label for="email">
                Email <span style="color: red;">*</span>
                <br>
                <input type="password" name="" id="email" placeholder="Enter your email" required>
            </label>

            <br><br>

            <label for="number">
                Phone number <span style="color: red;">*</span>
                <br>
                <input type="number" name="" id="number" placeholder="Enter your phone no" required>
            </label>

            <label for="subject">
                Subject<span style="color: red;">*</span>
                <br>
                <input type="text" placeholder="Enter your subject" required>
            </label>
            
            <br><br>

            <label for="message">
                Message <span style="color: red;">*</span>
                <br>
                <input style="padding: 8px 142px;" type="text" placeholder="Enter your message" required>
            </label>

            <br><br>

            <button><a href="">Submit</a></button>

        </div>

        <div class="form-2">
